<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The Snack Hut — delicious burgers, pizza, fries & more. Order online for delivery, take away or dine-in."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>The Snack Hut — Fresh. Fast. Delicious.</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply saved theme + accent before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem('theme')
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
          }
          var a = localStorage.getItem('accent')
          if (a && a !== 'orange') document.documentElement.setAttribute('data-accent', a)
        } catch (e) {}
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
